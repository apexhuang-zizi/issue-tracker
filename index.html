<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>问题追踪表</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--primary:#2563eb;--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--text-muted:#64748b;--success:#10b981;--danger:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:var(--surface);border-radius:12px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.05);flex-wrap:wrap;gap:16px}
.header h1{font-size:1.5rem;font-weight:600}
.header-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:.9rem;font-weight:500;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.table-wrapper{overflow-x:auto;background:var(--surface);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid var(--border);padding:0;vertical-align:top}
th{background:#f0f9ff;font-size:.75rem;font-weight:600;color:var(--text-muted);text-align:center;padding:12px 8px;text-transform:uppercase;position:sticky;top:0;z-index:10}
.row-num{text-align:center;font-weight:600;color:var(--text-muted);background:#f8fafc;width:50px}
textarea{width:100%;padding:8px;border:none;font-family:inherit;font-size:.85rem;resize:vertical;min-height:40px}
.cn-cell textarea{background:#fff}
.vi-cell textarea{background:#fffbeb}
.lang-tag{font-size:.65rem;padding:2px 6px;border-radius:3px;display:inline-block;margin:4px 0 2px 8px}
.lang-tag.cn{background:#dbeafe;color:#1e40af}
.lang-tag.vi{background:#fef3c7;color:#92400e}
.translating{color:#2563eb;font-size:.7rem;margin-left:4px;display:none}
.image-preview{display:flex;flex-wrap:wrap;gap:4px;padding:4px}
.image-thumb{width:40px;height:40px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:pointer}
.image-thumb:hover{transform:scale(1.1)}
.add-img-btn{width:40px;height:40px;border:2px dashed var(--border);border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--text-muted);background:var(--surface)}
.add-img-btn:hover{border-color:var(--primary);color:var(--primary)}
.delete-btn{background:none;border:none;color:var(--danger);cursor:pointer;font-size:1rem;padding:8px;border-radius:4px}
.header-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;padding:16px;background:var(--surface);border-radius:12px;margin-bottom:20px}
.info-field{display:flex;flex-direction:column;gap:4px}
.info-field label{font-size:.7rem;font-weight:500;color:var(--text-muted);text-transform:uppercase}
.info-field input{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit}
.action-bar{display:flex;justify-content:center;gap:12px;margin:20px 0;flex-wrap:wrap}
.image-viewer{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:1000}
.image-viewer.active{display:flex}
.image-viewer img{max-width:90%;max-height:90%}
.image-viewer .close-btn{position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:50%;background:#fff;border:none;cursor:pointer;font-size:20px}
.empty-row{text-align:center;padding:40px;color:var(--text-muted)}
@media(max-width:768px){.header{flex-direction:column;text-align:center}.header-info{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div><h1>问题追踪表</h1><p style="color:var(--text-muted)">Bảng theo dõi vấn đề / 中文 - Tiếng Việt</p></div>
<div class="header-actions">
<button class="btn btn-outline" id="saveBtn">💾 保存</button>
<button class="btn btn-success" id="excelBtn">📊 Excel</button>
<button class="btn btn-danger" id="pdfBtn">📄 PDF</button>
</div>
</div>

<div class="header-info">
<div class="info-field"><label>日期 / Ngày</label><input type="date" id="hDate"></div>
<div class="info-field"><label>记录人 / Người ghi</label><input type="text" id="hRecorder" placeholder="输入"></div>
<div class="info-field"><label>项目号 / Mã dự án</label><input type="text" id="hProject" placeholder="输入"></div>
<div class="info-field"><label>工单号 / Mã công việc</label><input type="text" id="hTicket" placeholder="输入"></div>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th class="row-num">#</th>
<th>问题描述 / Mô tả vấn đề</th>
<th>解决方法 / Giải pháp</th>
<th>图片</th>
<th></th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="action-bar">
<button class="btn btn-primary" id="addRowBtn">+ 新增一行</button>
</div>
</div>

<div class="image-viewer" id="imageViewer">
<button class="close-btn" id="closeBtn">X</button>
<img id="viewerImage" src="">
</div>
<div style="display:none"><input type="file" id="imgInput" accept="image/*" multiple></div>

<script>
var translatingCount = 0;

function translateText(text, fromLang, toLang, callback) {
    if (!text || !text.trim()) { callback(''); return; }
    translatingCount++;
    document.querySelectorAll('.translating').forEach(function(el) { el.style.display = 'inline'; });
    var encodedText = encodeURIComponent(text);
    var url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=' + fromLang + '&tl=' + toLang + '&hl=en&dt=t&dj=1&source=input&ie=UTF-8&oe=UTF-8&q=' + encodedText;
    fetch(url)
        .then(function(response) { return response.json(); })
        .then(function(data) {
            translatingCount--;
            if (translatingCount <= 0) { document.querySelectorAll('.translating').forEach(function(el) { el.style.display = 'none'; }); }
            if (data.sentences && data.sentences.length > 0) {
                var result = data.sentences.map(function(s) { return s.trans; }).join('');
                callback(result);
            } else { callback(''); }
        })
        .catch(function(err) {
            translatingCount--;
            if (translatingCount <= 0) { document.querySelectorAll('.translating').forEach(function(el) { el.style.display = 'none'; }); }
            callback('');
        });
}

var records = [];
var curRow = -1;
var header = {};

function init() {
    records = JSON.parse(localStorage.getItem('issues') || '[]');
    header = JSON.parse(localStorage.getItem('issueHeader') || '{}');
    document.getElementById('hDate').value = header.date || '';
    document.getElementById('hRecorder').value = header.recorder || '';
    document.getElementById('hProject').value = header.project || '';
    document.getElementById('hTicket').value = header.ticket || '';
    if (!header.date) document.getElementById('hDate').valueAsDate = new Date();
    render();
}

function autoTrans(el) {
    var tr = el.closest('tr');
    var idx = parseInt(tr.dataset.idx);
    var tp = el.dataset.tp;
    var isCn = el.classList.contains('cn-cell');
    if (!records[idx]) return;
    var text = el.value;
    if (!text || !text.trim()) return;
    if (isCn && text) {
        records[idx][tp + 'Cn'] = text;
        var viEl = tr.querySelector('.vi-cell textarea[data-tp="' + tp + '"]');
        if (viEl) viEl.value = '翻译中...';
        var viIndicator = tr.querySelector('.vi-cell[data-tp="' + tp + '"] .translating');
        if (viIndicator) viIndicator.style.display = 'inline';
        translateText(text, 'zh-CN', 'vi', function(result) {
            records[idx][tp + 'Vi'] = result;
            if (viEl) viEl.value = result;
            var ind = tr.querySelector('.vi-cell[data-tp="' + tp + '"] .translating');
            if (ind) ind.style.display = 'none';
        });
    } else if (!isCn && text) {
        records[idx][tp + 'Vi'] = text;
        var cnEl = tr.querySelector('.cn-cell textarea[data-tp="' + tp + '"]');
        if (cnEl) cnEl.value = '翻译中...';
        var cnIndicator = tr.querySelector('.cn-cell[data-tp="' + tp + '"] .translating');
        if (cnIndicator) cnIndicator.style.display = 'inline';
        translateText(text, 'vi', 'zh-CN', function(result) {
            records[idx][tp + 'Cn'] = result;
            if (cnEl) cnEl.value = result;
            var ind = tr.querySelector('.cn-cell[data-tp="' + tp + '"] .translating');
            if (ind) ind.style.display = 'none';
        });
    }
    saveData();
}

function render() {
    var tb = document.getElementById('tableBody');
    if (!records.length) {
        tb.innerHTML = '<tr><td colspan="5" class="empty-row">暂无记录，点击下方按钮新增</td></tr>';
        return;
    }
    var html = '';
    for (var i = 0; i < records.length; i++) {
        var r = records[i];
        html += '<tr data-idx="' + i + '">' +
            '<td class="row-num">' + (i + 1) + '</td>' +
            '<td>' +
                '<div class="cn-cell" data-tp="issue"><span class="lang-tag cn">中文</span><textarea rows="2" class="cn-cell" data-tp="issue" placeholder="输入问题..." oninput="autoTrans(this)">' + escHtml(r.issueCn || '') + '</textarea></div>' +
                '<div class="vi-cell" data-tp="issue"><span class="lang-tag vi">越南文</span><span class="translating">🔄</span><textarea rows="2" class="vi-cell" data-tp="issue" placeholder="Nhập vấn đề..." oninput="autoTrans(this)">' + escHtml(r.issueVi || '') + '</textarea></div>' +
            '</td>' +
            '<td>' +
                '<div class="cn-cell" data-tp="sol"><span class="lang-tag cn">中文</span><textarea rows="2" class="cn-cell" data-tp="sol" placeholder="输入解决方法..." oninput="autoTrans(this)">' + escHtml(r.solCn || '') + '</textarea></div>' +
                '<div class="vi-cell" data-tp="sol"><span class="lang-tag vi">越南文</span><span class="translating">🔄</span><textarea rows="2" class="vi-cell" data-tp="sol" placeholder="Nhập giải pháp..." oninput="autoTrans(this)">' + escHtml(r.solVi || '') + '</textarea></div>' +
            '</td>' +
            '<td><div class="image-preview">';
        if (r.imgs && r.imgs.length) {
            for (var j = 0; j < r.imgs.length; j++) {
                html += '<img src="' + r.imgs[j] + '" class="image-thumb" onclick="viewImg(this.src)">';
            }
        }
        html += '</div><button class="add-img-btn" onclick="pickImg(' + i + ')">+</button></td>' +
            '<td><button class="delete-btn" onclick="delRow(' + i + ')">🗑️</button></td>' +
        '</tr>';
    }
    tb.innerHTML = html;
}

function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function addRow() {
    records.unshift({issueCn:'', issueVi:'', solCn:'', solVi:'', imgs:[]});
    saveData();
    render();
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function delRow(i) {
    if (confirm('删除此行?')) { records.splice(i, 1); saveData(); render(); }
}

function pickImg(i) { curRow = i; document.getElementById('imgInput').click(); }

document.getElementById('imgInput').onchange = function(e) {
    if (curRow < 0 || !e.target.files.length) return;
    if (!records[curRow].imgs) records[curRow].imgs = [];
    var files = Array.from(e.target.files).slice(0, 6 - records[curRow].imgs.length);
    files.forEach(function(file) {
        var reader = new FileReader();
        reader.onload = function(evt) {
            records[curRow].imgs.push(evt.target.result);
            saveData();
            render();
        };
        reader.readAsDataURL(file);
    });
    e.target.value = '';
};

function viewImg(src) { document.getElementById('viewerImage').src = src; document.getElementById('imageViewer').classList.add('active'); }
document.getElementById('closeBtn').onclick = function() { document.getElementById('imageViewer').classList.remove('active'); };
document.getElementById('imageViewer').onclick = function(e) { if (e.target === this) this.classList.remove('active'); };

function saveData() {
    localStorage.setItem('issues', JSON.stringify(records));
    localStorage.setItem('issueHeader', JSON.stringify({
        date: document.getElementById('hDate').value,
        recorder: document.getElementById('hRecorder').value,
        project: document.getElementById('hProject').value,
        ticket: document.getElementById('hTicket').value
    }));
}

document.getElementById('saveBtn').onclick = function() { saveData(); alert('已保存! / Đã lưu!'); };
document.getElementById('addRowBtn').onclick = addRow;
['hDate', 'hRecorder', 'hProject', 'hTicket'].forEach(function(id) {
    document.getElementById(id).oninput = saveData;
});

document.getElementById('excelBtn').onclick = function() {
    if (!records.length) { alert('暂无数据'); return; }
    var csv = '\uFEFF日期,记录人,项目号,工单号,问题(中文),问题(越南文),解决方法(中文),解决方法(越南文),图片数量\n';
    records.forEach(function(r) {
        csv += '"' + (header.date||'') + '","' + (header.recorder||'') + '","' + (header.project||'') + '","' + (header.ticket||'') + '","' + (r.issueCn||'') + '","' + (r.issueVi||'') + '","' + (r.solCn||'') + '","' + (r.solVi||'') + '","' + (r.imgs ? r.imgs.length : 0) + '"\n';
    });
    var blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '问题追踪表_' + new Date().toISOString().split('T')[0] + '.csv';
    a.click();
};

document.getElementById('pdfBtn').onclick = function() {
    if (!records.length) { alert('暂无数据'); return; }
    var p = window.open('', '');
    p.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>问题追踪表</title><style>body{font-family:Arial,sans-serif;padding:20px}h1{text-align:center;margin-bottom:20px}h3{font-size:14px;margin:16px 0 8px}p{margin:4px 0;font-size:12px}table{width:100%;border-collapse:collapse;margin-top:12px;font-size:11px}th,td{border:1px solid #333;padding:6px;text-align:left;vertical-align:top}th{background:#eee;font-weight:bold}</style></head><body><h1>问题追踪表</h1><h3>基本信息</h3><p><b>日期:</b> ' + (header.date||'') + ' &nbsp; <b>记录人:</b> ' + (header.recorder||'') + ' &nbsp; <b>项目号:</b> ' + (header.project||'') + ' &nbsp; <b>工单号:</b> ' + (header.ticket||'') + '</p><h3>问题记录</h3><table><thead><tr><th style="width:30px">#</th><th style="width:28%">问题描述(中文)</th><th style="width:28%">问题描述(越南文)</th><th style="width:22%">解决方法(中文)</th><th style="width:22%">解决方法(越南文)</th></tr></thead><tbody>');
    records.forEach(function(r, i) {
        p.document.write('<tr><td>' + (i+1) + '</td><td>' + (r.issueCn||'') + '</td><td>' + (r.issueVi||'') + '</td><td>' + (r.solCn||'') + '</td><td>' + (r.solVi||'') + '</td></tr>');
    });
    p.document.write('</tbody></table><p style="margin-top:20px;font-size:10px;color:#666">导出时间: ' + new Date().toLocaleString() + '</p><script>window.print();<\/script></body></html>');
    p.document.close();
};

window.onbeforeunload = saveData;
init();
</script>
</body>
</html>
