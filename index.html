<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>问题追踪表</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--primary:#2563eb;--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--text-muted:#64748b;--success:#10b981;--danger:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:var(--surface);border-radius:12px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.05);flex-wrap:wrap;gap:16px}
.header h1{font-size:1.5rem;font-weight:600}
.header-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:.9rem;font-weight:500;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:#f1f5f9}
.table-wrapper{overflow-x:auto;background:var(--surface);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th,td{border:1px solid var(--border);padding:0;vertical-align:top}
th{background:#f0f9ff;font-size:.7rem;font-weight:600;color:var(--text-muted);text-align:center;padding:8px 4px;text-transform:uppercase;position:sticky;top:0;z-index:10}
.row-num{width:40px;text-align:center;font-weight:600;color:var(--text-muted);background:#f8fafc}
.category-col{width:120px}
.issue-col{width:28%}
.sol-col{width:28%}
.img-col{width:16%}
.action-col{width:40px}
textarea{width:100%;padding:6px;border:none;font-family:inherit;font-size:.8rem;resize:vertical;min-height:32px}
.cn-cell textarea{background:#fff}
.vi-cell textarea{background:#fffbeb}
.lang-tag{font-size:.6rem;padding:1px 4px;border-radius:3px;display:inline-block;margin:2px 0}
.lang-tag.cn{background:#dbeafe;color:#1e40af}
.lang-tag.vi{background:#fef3c7;color:#92400e}
select{width:100%;padding:4px;border:1px solid var(--border);border-radius:4px;font-family:inherit;font-size:.7rem;background:#fff}
.image-preview{display:flex;flex-wrap:wrap;gap:4px;padding:4px;align-items:center;min-height:88px}
.image-thumb{width:80px;height:80px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:pointer;flex-shrink:0}
.image-thumb:hover{transform:scale(1.05)}
.add-img-btn{width:80px;height:80px;border:2px dashed var(--border);border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--text-muted);background:var(--surface);flex-shrink:0}
.add-img-btn:hover{border-color:var(--primary);color:var(--primary)}
.delete-btn{background:none;border:none;color:var(--danger);cursor:pointer;font-size:.9rem;padding:4px}
.delete-btn:hover{background:#fef2f2}
.header-info{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 2fr;gap:12px;padding:16px;background:var(--surface);border-radius:12px;margin-bottom:20px}
.info-field{display:flex;flex-direction:column;gap:4px}
.info-field label{font-size:.7rem;font-weight:500;color:var(--text-muted);text-transform:uppercase}
.info-field input{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit}
.product-images{display:flex;flex-direction:column;gap:8px}
.product-images label{font-size:.7rem;font-weight:500;color:var(--text-muted);text-transform:uppercase}
.product-img-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;min-height:88px}
.product-thumb{width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer;flex-shrink:0}
.product-thumb:hover{transform:scale(1.05)}
.action-bar{display:flex;justify-content:center;gap:12px;margin:20px 0;flex-wrap:wrap}
.image-viewer{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:1000}
.image-viewer.active{display:flex}
.image-viewer img{max-width:90%;max-height:90%}
.image-viewer .close-btn{position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:50%;background:#fff;border:none;cursor:pointer;font-size:20px}
.image-viewer .save-btn{position:absolute;top:20px;right:70px;background:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px}
.empty-row{text-align:center;padding:40px;color:var(--text-muted)}
.saved-indicator{position:fixed;bottom:20px;right:20px;background:var(--success);color:#fff;padding:10px 20px;border-radius:8px;display:none;z-index:1000}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:2000}
.loading-overlay.active{display:flex}
.loading-box{background:#fff;padding:30px 50px;border-radius:12px;text-align:center}
.loading-box h3{color:#333;margin-bottom:10px}
/* 手机端适配 */
@media(max-width:768px){
.container{padding:10px}
.header{flex-direction:column;text-align:center;padding:15px}
.header h1{font-size:1.2rem}
.header-info{grid-template-columns:1fr;gap:8px;padding:12px}
.header-info .info-field:first-child{grid-column:1}
.header-info .product-images{grid-column:1}
.table-wrapper{font-size:.75rem}
th,td{padding:4px 2px!important;font-size:.65rem}
textarea{font-size:.7rem;min-height:24px}
select{font-size:.65rem;padding:2px}
.image-thumb,.add-img-btn,.product-thumb{width:50px;height:50px}
.image-preview{min-height:60px}
.btn{padding:8px 12px;font-size:.8rem}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div><h1>问题追踪表</h1><p style="color:var(--text-muted)">Bang theo doi van de / 问题追踪表</p></div>
<div class="header-actions">
<button class="btn btn-outline" id="saveBtn">💾 保存</button>
<button class="btn btn-danger" id="pdfBtn">📄 PDF</button>
</div>
</div>

<div class="header-info">
<div class="info-field"><label>日期 / Ngay</label><input type="date" id="hDate"></div>
<div class="info-field"><label>记录人 / Nguoi ghi</label><input type="text" id="hRecorder" placeholder="输入 / Nhap"></div>
<div class="info-field"><label>项目号 / Ma du an</label><input type="text" id="hProject" placeholder="输入 / Nhap"></div>
<div class="info-field"><label>工单号 / Ma CV</label><input type="text" id="hTicket" placeholder="输入 / Nhap"></div>
<div class="info-field product-images"><label>产品图片 / Anh san pham (最多6张)</label><div class="product-img-row" id="productImgRow"></div></div>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th class="row-num">#</th>
<th class="category-col">问题分类<br/>/Phan loai</th>
<th class="issue-col">问题描述 / Mo ta van de</th>
<th class="sol-col">解决方法 / Giai phap</th>
<th class="img-col">图片 / Anh</th>
<th class="action-col"></th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="action-bar">
<button class="btn btn-primary" id="addRowBtn">+ 新增一行 / Them dong</button>
</div>
</div>

<div class="image-viewer" id="imageViewer">
<button class="close-btn" id="closeBtn">X</button>
<button class="save-btn" id="saveImgBtn">💾 保存图片</button>
<img id="viewerImage" src="">
</div>
<div class="saved-indicator" id="savedIndicator">已保存 / Da luu!</div>
<div class="loading-overlay" id="loadingOverlay">
<div class="loading-box">
<h3>正在生成PDF...</h3>
<p style="color:#666">Generating PDF...</p>
</div>
</div>
<input type="file" id="imgInput" accept="image/*" multiple style="display:none">
<input type="file" id="productImgInput" accept="image/*" multiple style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
(function(){
var curRow = -1;
var currentViewerImg = '';
var records = [];
var header = {};
var productImgs = [];

var CATEGORIES = [
    {cn:'选择分类', vn:'-- Chon loai --'},
    {cn:'图纸问题', vn:'Loi ban ve'},
    {cn:'施工错误', vn:'Loi thi cong'},
    {cn:'保护不当', vn:'Bao ve khong dung'},
    {cn:'技能不足', vn:'Ky nang khong du'},
    {cn:'来料问题', vn:'Van de nguyen lieu'},
    {cn:'不明原因', vn:'Nguyen nhan khong ro'}
];

// 获取本地日期字符串（避免UTC时区问题）
function getLocalDate() {
    var now = new Date();
    return now.getFullYear() + '-' + 
           String(now.getMonth() + 1).padStart(2, '0') + '-' + 
           String(now.getDate()).padStart(2, '0');
}

function getFileName(suffix) {
    var project = document.getElementById('hProject').value.trim() || 'KhongCoDuAn';
    var date = getLocalDate();
    project = project.replace(/[\\/:*?"<>|]/g, '_');
    return '问题追踪表-' + project + '-' + date + suffix;
}

function getCategoryText(idx, lang) {
    if (idx >= 0 && idx < CATEGORIES.length) {
        return lang === 'cn' ? CATEGORIES[idx].cn : CATEGORIES[idx].vn;
    }
    return '';
}

function translateText(text, fromLang, toLang, callback) {
    if (!text || !text.trim()) { callback(''); return; }
    var url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=' + fromLang + '&tl=' + toLang + '&hl=en&dt=t&dj=1&source=input&ie=UTF-8&oe=UTF-8&q=' + encodeURIComponent(text);
    fetch(url)
        .then(function(response) { return response.json(); })
        .then(function(data) {
            if (data.sentences && data.sentences.length > 0) {
                var result = data.sentences.map(function(s) { return s.trans; }).join('');
                callback(result);
            } else { callback(''); }
        })
        .catch(function(err) { callback(''); });
}

function init() {
    var today = getLocalDate();
    try { records = JSON.parse(localStorage.getItem('issues10') || '[]'); } catch(e) { records = []; }
    try { header = JSON.parse(localStorage.getItem('issueHeader10') || '{}'); } catch(e) { header = {}; }
    try { productImgs = JSON.parse(localStorage.getItem('productImgs10') || '[]'); } catch(e) { productImgs = []; }
    // 始终使用今天日期（本地时间）
    document.getElementById('hDate').value = today;
    document.getElementById('hRecorder').value = header.recorder || 'Apex';
    document.getElementById('hProject').value = header.project || '';
    document.getElementById('hTicket').value = header.ticket || '';
    // 保存当前日期到header
    header.date = today;
    saveData();
    renderProductImgs();
    render();
}

function saveData() {
    try {
        localStorage.setItem('issues10', JSON.stringify(records));
        localStorage.setItem('issueHeader10', JSON.stringify({
            date: document.getElementById('hDate').value,
            recorder: document.getElementById('hRecorder').value,
            project: document.getElementById('hProject').value,
            ticket: document.getElementById('hTicket').value
        }));
        localStorage.setItem('productImgs10', JSON.stringify(productImgs));
    } catch(e) {}
    var indicator = document.getElementById('savedIndicator');
    indicator.style.display = 'block';
    setTimeout(function() { indicator.style.display = 'none'; }, 2000);
}

function renderProductImgs() {
    var row = document.getElementById('productImgRow');
    var html = '';
    for (var i = 0; i < productImgs.length; i++) { 
        html += '<img src="' + productImgs[i] + '" class="product-thumb" data-src="' + productImgs[i] + '">'; 
    }
    if (productImgs.length < 6) { 
        html += '<button class="add-img-btn" id="addProductImg">+</button>'; 
    }
    row.innerHTML = html;
    var btn = document.getElementById('addProductImg');
    if (btn) { btn.addEventListener('click', function() { document.getElementById('productImgInput').click(); }); }
    var thumbs = row.querySelectorAll('.product-thumb');
    thumbs.forEach(function(thumb) {
        thumb.addEventListener('click', function() { viewImg(this.getAttribute('data-src')); });
    });
}

function render() {
    var tb = document.getElementById('tableBody');
    if (!records.length) { 
        tb.innerHTML = '<tr><td colspan="6" class="empty-row">暂无记录 / Chua co ban ghi</td></tr>'; 
        return; 
    }
    var html = '';
    
    for (var i = 0; i < records.length; i++) {
        var r = records[i];
        var selectedIdx = r.category !== undefined ? r.category : 0;
        var imgsHtml = '';
        if (r.imgs && r.imgs.length > 0) { 
            for (var j = 0; j < r.imgs.length; j++) { 
                imgsHtml += '<img src="' + r.imgs[j] + '" class="image-thumb" data-src="' + r.imgs[j] + '">'; 
            } 
        }
        imgsHtml += '<button class="add-img-btn" data-row="' + i + '">+</button>';
        
        var categoryOptions = '';
        for (var k = 0; k < CATEGORIES.length; k++) {
            var sel = k === selectedIdx ? ' selected' : '';
            categoryOptions += '<option value="' + k + '"' + sel + '>' + CATEGORIES[k].cn + ' / ' + CATEGORIES[k].vn + '</option>';
        }
        
        html += '<tr data-idx="' + i + '"><td class="row-num">' + (i + 1) + '</td>' +
            '<td class="category-col"><select class="category-select" data-idx="' + i + '">' + categoryOptions + '</select></td>' +
            '<td><div class="cn-cell" data-tp="issue"><span class="lang-tag cn">中文</span><textarea rows="2" class="cn-cell" data-tp="issue" data-field="issueCn" placeholder="输入... / Nhap...">' + escHtml(r.issueCn || '') + '</textarea></div><div class="vi-cell" data-tp="issue"><span class="lang-tag vi">越南文</span><textarea rows="2" class="vi-cell" data-tp="issue" data-field="issueVi" placeholder="Nhập... / Nhap...">' + escHtml(r.issueVi || '') + '</textarea></div></td>' +
            '<td><div class="cn-cell" data-tp="sol"><span class="lang-tag cn">中文</span><textarea rows="2" class="cn-cell" data-tp="sol" data-field="solCn" placeholder="输入... / Nhap...">' + escHtml(r.solCn || '') + '</textarea></div><div class="vi-cell" data-tp="sol"><span class="lang-tag vi">越南文</span><textarea rows="2" class="vi-cell" data-tp="sol" data-field="solVi" placeholder="Nhập... / Nhap...">' + escHtml(r.solVi || '') + '</textarea></div></td>' +
            '<td><div class="image-preview">' + imgsHtml + '</div></td>' +
            '<td class="action-col"><button class="delete-btn" data-idx="' + i + '">🗑️</button></td></tr>';
    }
    tb.innerHTML = html;
    bindTableEvents();
}

function bindTableEvents() {
    var imgThumbs = document.querySelectorAll('.image-thumb');
    imgThumbs.forEach(function(thumb) {
        thumb.addEventListener('click', function() { viewImg(this.getAttribute('data-src')); });
    });
    var addBtns = document.querySelectorAll('.add-img-btn[data-row]');
    addBtns.forEach(function(btn) {
        btn.addEventListener('click', function() { 
            curRow = parseInt(this.getAttribute('data-row')); 
            document.getElementById('imgInput').click(); 
        });
    });
    var delBtns = document.querySelectorAll('.delete-btn[data-idx]');
    delBtns.forEach(function(btn) {
        btn.addEventListener('click', function() { 
            var idx = parseInt(this.getAttribute('data-idx')); 
            if (confirm('删除此行? / Xoa dong nay?')) { records.splice(idx, 1); saveData(); render(); } 
        });
    });
    var categorySelects = document.querySelectorAll('.category-select');
    categorySelects.forEach(function(sel) {
        sel.addEventListener('change', function() {
            var idx = parseInt(this.getAttribute('data-idx'));
            records[idx].category = parseInt(this.value);
            saveData();
        });
    });
    var textareas = document.querySelectorAll('textarea[data-field]');
    textareas.forEach(function(ta) {
        ta.addEventListener('input', function() {
            var tr = this.closest('tr');
            var idx = parseInt(tr.getAttribute('data-idx'));
            var field = this.getAttribute('data-field');
            var tp = this.getAttribute('data-tp');
            var isCn = this.classList.contains('cn-cell');
            records[idx][field] = this.value;
            if (isCn && this.value.trim()) {
                translateText(this.value, 'zh-CN', 'vi', function(result) {
                    records[idx][tp + 'Vi'] = result;
                    var viTa = tr.querySelector('.vi-cell textarea[data-tp="' + tp + '"]');
                    if (viTa) viTa.value = result;
                    saveData();
                });
            } else if (!isCn && this.value.trim()) {
                translateText(this.value, 'vi', 'zh-CN', function(result) {
                    records[idx][tp + 'Cn'] = result;
                    var cnTa = tr.querySelector('.cn-cell textarea[data-tp="' + tp + '"]');
                    if (cnTa) cnTa.value = result;
                    saveData();
                });
            } else {
                saveData();
            }
        });
    });
}

function escHtml(str) { return str ? str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : ''; }

function addRow() { 
    records.push({category:0, issueCn:'', issueVi:'', solCn:'', solVi:'', imgs:[]}); 
    saveData(); 
    render(); 
    var tb = document.getElementById('tableBody');
    tb.scrollTop = tb.scrollHeight;
}

document.getElementById('imgInput').addEventListener('change', function(e) {
    if (curRow < 0 || !e.target.files.length) return;
    if (!records[curRow].imgs) records[curRow].imgs = [];
    var files = Array.from(e.target.files).slice(0, 6 - records[curRow].imgs.length);
    var loaded = 0;
    files.forEach(function(file) {
        var reader = new FileReader();
        reader.onload = function(evt) { 
            records[curRow].imgs.push(evt.target.result); 
            loaded++;
            if (loaded === files.length) { saveData(); render(); }
        };
        reader.readAsDataURL(file);
    });
    e.target.value = '';
});

document.getElementById('productImgInput').addEventListener('change', function(e) {
    if (!e.target.files.length) return;
    var files = Array.from(e.target.files).slice(0, 6 - productImgs.length);
    var loaded = 0;
    files.forEach(function(file) {
        var reader = new FileReader();
        reader.onload = function(evt) { 
            productImgs.push(evt.target.result); 
            loaded++;
            if (loaded === files.length) { saveData(); renderProductImgs(); }
        };
        reader.readAsDataURL(file);
    });
    e.target.value = '';
});

function viewImg(src) { 
    currentViewerImg = src;
    document.getElementById('viewerImage').src = src; 
    document.getElementById('imageViewer').classList.add('active'); 
}

document.getElementById('saveImgBtn').addEventListener('click', function() {
    if (!currentViewerImg) return;
    var timestamp = getLocalDate();
    var filename = 'Anh-' + timestamp + '.png';
    var a = document.createElement('a');
    a.href = currentViewerImg;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
});

document.getElementById('closeBtn').addEventListener('click', function() { document.getElementById('imageViewer').classList.remove('active'); });
document.getElementById('imageViewer').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });

document.getElementById('saveBtn').addEventListener('click', function() { 
    saveData();
    downloadHTMLBackup();
});

function downloadHTMLBackup() {
    var filename = getFileName('.html');
    var project = document.getElementById('hProject').value.trim() || 'KhongCoDuAn';
    var date = document.getElementById('hDate').value || getLocalDate();
    var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>问题追踪表 - ' + escHtml(project) + '</title>';
    html += '<style>body{font-family:Arial;padding:30px;max-width:1200px;margin:0 auto}h1{text-align:center;border-bottom:2px solid #333}table{width:100%;border-collapse:collapse;margin:20px 0}th,td{border:1px solid #333;padding:10px;text-align:left}th{background:#f0f9ff}h2{margin-top:20px}</style>';
    html += '</head><body><h1>问题追踪表 / Issue Tracker</h1>';
    html += '<h2>基本信息 / Basic Info</h2>';
    html += '<p>日期/Ngay: ' + date + ' | 记录人/Nguoi ghi: ' + (header.recorder||'') + ' | 项目号/Ma du an: ' + project + ' | 工单号/Ma CV: ' + (header.ticket||'') + '</p>';
    html += '<h2>产品图片 / Product Images</h2><p>';
    productImgs.forEach(function(img) { html += '<img src="' + img + '" style="width:80px;height:80px;object-fit:cover;margin:4px;border:1px solid #ccc">'; });
    html += '</p><h2>问题记录 / Issue List</h2>';
    html += '<table><thead><tr><th>#</th><th>分类/Category</th><th>问题描述/Issue</th><th>解决方法/Solution</th><th>图片/Images</th></tr></thead><tbody>';
    records.forEach(function(r, i) {
        var catText = getCategoryText(r.category, 'cn') + ' / ' + getCategoryText(r.category, 'vn');
        var imgs = '';
        if (r.imgs) { r.imgs.forEach(function(img) { imgs += '<img src="' + img + '" style="width:40px;height:40px;object-fit:cover;margin:2px">'; }); }
        html += '<tr><td>' + (i+1) + '</td><td>' + escHtml(catText) + '</td><td>CN: ' + escHtml(r.issueCn||'') + '<br>VN: ' + escHtml(r.issueVi||'') + '</td><td>CN: ' + escHtml(r.solCn||'') + '<br>VN: ' + escHtml(r.solVi||'') + '</td><td>' + imgs + '</td></tr>';
    });
    html += '</tbody></table>';
    html += '<p style="margin-top:30px;color:#666">导出时间/Export time: ' + new Date().toLocaleString() + '</p>';
    html += '</body></html>';
    
    var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

document.getElementById('addRowBtn').addEventListener('click', addRow);

['hDate','hRecorder','hProject','hTicket'].forEach(function(id) { 
    document.getElementById(id).addEventListener('input', saveData); 
});

document.getElementById('pdfBtn').addEventListener('click', function() {
    if (!records.length) { alert('暂无数据 / Chua co du lieu'); return; }
    
    var filename = getFileName('.pdf');
    var loadingOverlay = document.getElementById('loadingOverlay');
    loadingOverlay.classList.add('active');
    
    var project = document.getElementById('hProject').value.trim() || 'KhongCoDuAn';
    var date = document.getElementById('hDate').value || getLocalDate();
    
    var pdfContent = document.createElement('div');
    pdfContent.style.cssText = 'position:fixed;left:-9999px;top:0;width:1100px;padding:40px;background:#fff;font-family:Arial,sans-serif;';
    document.body.appendChild(pdfContent);
    
    var html = '<h1 style="text-align:center;font-size:24px;margin-bottom:30px;border-bottom:2px solid #333;padding-bottom:15px">问题追踪表 / Issue Tracker</h1>';
    html += '<div style="margin-bottom:20px"><strong>基本信息 / Basic Info:</strong><br>';
    html += '日期/Date: ' + date + ' | 记录人/Recorder: ' + (header.recorder||'') + ' | 项目号/Project: ' + project + ' | 工单号/Ticket: ' + (header.ticket||'') + '</div>';
    
    if (productImgs.length > 0) {
        html += '<div style="margin-bottom:20px"><strong>产品图片 / Product Images:</strong><br>';
        productImgs.forEach(function(img) { html += '<img src="' + img + '" style="width:80px;height:80px;object-fit:cover;margin:4px;border:1px solid #ccc">'; });
        html += '</div>';
    }
    
    html += '<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:15px">';
    html += '<thead><tr style="background:#f0f9ff"><th style="border:1px solid #333;padding:8px;width:30px">#</th><th style="border:1px solid #333;padding:8px;width:80px">分类</th><th style="border:1px solid #333;padding:8px">问题描述 / Issue</th><th style="border:1px solid #333;padding:8px">解决方法 / Solution</th><th style="border:1px solid #333;padding:8px;width:150px">图片 / Images</th></tr></thead><tbody>';
    
    records.forEach(function(r, i) {
        var catText = getCategoryText(r.category, 'cn') + ' / ' + getCategoryText(r.category, 'vn');
        var imgs = '';
        if (r.imgs && r.imgs.length > 0) { 
            r.imgs.forEach(function(img) { imgs += '<img src="' + img + '" style="width:40px;height:40px;object-fit:cover;margin:2px">'; }); 
        }
        html += '<tr><td style="border:1px solid #333;padding:8px;vertical-align:top">' + (i+1) + '</td>';
        html += '<td style="border:1px solid #333;padding:8px;vertical-align:top">' + escHtml(catText) + '</td>';
        html += '<td style="border:1px solid #333;padding:8px;vertical-align:top"><strong>CN:</strong> ' + escHtml(r.issueCn||'') + '<br><span style="color:#666;font-size:10px"><strong>VN:</strong> ' + escHtml(r.issueVi||'') + '</span></td>';
        html += '<td style="border:1px solid #333;padding:8px;vertical-align:top"><strong>CN:</strong> ' + escHtml(r.solCn||'') + '<br><span style="color:#666;font-size:10px"><strong>VN:</strong> ' + escHtml(r.solVi||'') + '</span></td>';
        html += '<td style="border:1px solid #333;padding:8px;vertical-align:top">' + imgs + '</td></tr>';
    });
    
    html += '</tbody></table>';
    html += '<p style="margin-top:30px;color:#666;font-size:10px">导出时间 / Export time: ' + new Date().toLocaleString() + '</p>';
    
    pdfContent.innerHTML = html;
    
    html2canvas(pdfContent, {scale: 2, useCORS: true, logging: false}).then(function(canvas) {
        var imgData = canvas.toDataURL('image/jpeg', 0.8);
        var imgWidth = canvas.width;
        var imgHeight = canvas.height;
        
        var pdfWidth = 295;
        var pdfHeight = (imgHeight * pdfWidth) / imgWidth + 10;
        
        var jsPDF = window.jspdf.jsPDF;
        var pdf = new jsPDF('l', 'mm', [pdfWidth, pdfHeight]);
        
        var onePageHeight = (imgHeight * pdfWidth) / imgWidth;
        var pageHeight = 200;
        
        if (onePageHeight > pageHeight) {
            var totalPages = Math.ceil(onePageHeight / pageHeight);
            for (var p = 0; p < totalPages; p++) {
                if (p > 0) pdf.addPage();
                var yOffset = -p * pageHeight;
                pdf.addImage(imgData, 'JPEG', 0, yOffset, pdfWidth, onePageHeight);
            }
        } else {
            pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, onePageHeight);
        }
        
        pdf.save(filename);
        
        document.body.removeChild(pdfContent);
        loadingOverlay.classList.remove('active');
    }).catch(function(err) {
        console.error('PDF生成失败:', err);
        document.body.removeChild(pdfContent);
        loadingOverlay.classList.remove('active');
        alert('PDF生成失败，请重试 / PDF generation failed');
    });
});

window.addEventListener('beforeunload', saveData);
init();
})();
</script>
</body>
</html>
