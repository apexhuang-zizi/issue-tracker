<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>问题追踪表 - Bảng theo dõi vấn đề</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--primary:#2563eb;--primary-dark:#1d4ed8;--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--text-muted:#64748b;--success:#10b981;--danger:#ef4444;--warning:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:var(--surface);border-radius:12px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.05);flex-wrap:wrap;gap:16px}
.header h1{font-size:1.5rem;font-weight:600}
.header p{color:var(--text-muted);font-size:.9rem}
.header-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:.9rem;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--border)}
.btn-sm{padding:6px 12px;font-size:.8rem}
.table-wrapper{overflow-x:auto;background:var(--surface);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid var(--border);padding:0;vertical-align:top}
th{background:#f8fafc;font-size:.75rem;font-weight:600;color:var(--text-muted);text-align:center;padding:12px 8px;text-transform:uppercase;position:sticky;top:0;z-index:10}
.row-header{width:50px;text-align:center!important;background:#f0f9ff}
.row-actions{width:80px;text-align:center!important}
td textarea{width:100%;min-height:60px;padding:10px;border:none;resize:vertical;font-family:inherit;font-size:.9rem;background:transparent}
td textarea:focus{outline:none;background:#fff9}
.cell-lang{display:flex;flex-direction:column}
.cell-lang textarea{font-size:.85rem;min-height:30px;padding:6px 10px}
.cell-lang .vi-cell{border-top:1px dashed var(--border);background:#fffbeb}
.lang-label{font-size:.65rem;padding:2px 6px;border-radius:3px;margin:4px 0 2px 10px;display:inline-block;align-self:flex-start}
.lang-label.cn{background:#dbeafe;color:#1e40af}
.lang-label.vi{background:#fef3c7;color:#92400e}
.image-cell{text-align:center;padding:8px}
.add-image-btn{width:60px;height:60px;border:2px dashed var(--border);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--surface)}
.add-image-btn:hover{border-color:var(--primary);background:#f0f9ff}
.add-image-btn svg{color:var(--text-muted)}
.image-preview{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.image-thumb{width:50px;height:50px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:pointer;transition:transform .2s}
.image-thumb:hover{transform:scale(1.1)}
.row-num{text-align:center;font-weight:600;color:var(--text-muted);background:#f8fafc}
.delete-row{background:none;border:none;color:var(--danger);cursor:pointer;padding:8px;border-radius:4px}
.delete-row:hover{background:#fef2f2}
.footer-row td{background:#f0fafc;text-align:center;padding:12px}
.footer-row button{width:100%}
.table-input-row td{padding:0}
.header-row{display:flex;gap:16px;flex-wrap:wrap;padding:16px;background:var(--surface);border-radius:12px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.header-field{display:flex;flex-direction:column;gap:4px}
.header-field label{font-size:.7rem;font-weight:500;color:var(--text-muted);text-transform:uppercase}
.header-field input{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit}
.header-field input:focus{outline:none;border-color:var(--primary)}
.image-viewer{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:1000}
.image-viewer.active{display:flex}
.image-viewer img{max-width:90%;max-height:90%}
.image-viewer .close-btn{position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:50%;background:#fff;border:none;cursor:pointer;font-size:20px}
.empty-row{text-align:center;padding:40px;color:var(--text-muted)}
@media(max-width:768px){.header{flex-direction:column;text-align:center}.header-row{flex-direction:column}.header-actions{justify-content:center}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div><h1>问题追踪表</h1><p>Bảng theo dõi vấn đề - Tiếng Việt / 中文</p></div>
<div class="header-actions">
<button class="btn btn-success" onclick="exportExcel()">导出Excel</button>
<button class="btn btn-danger" onclick="exportPDF()">导出PDF</button>
</div>
</div>

<div class="header-row">
<div class="header-field"><label>日期 / Ngày</label><input type="date" id="headerDate"></div>
<div class="header-field"><label>记录人 / Người ghi</label><input type="text" id="headerRecorder" placeholder="中文或越南文"></div>
<div class="header-field"><label>项目号 / Mã dự án</label><input type="text" id="headerProject" placeholder="中文或越南文"></div>
<div class="header-field"><label>工单号 / Mã công việc</label><input type="text" id="headerTicket" placeholder="中文或越南文"></div>
</div>

<div class="table-wrapper">
<table id="mainTable">
<thead>
<tr>
<th class="row-header">#</th>
<th style="min-width:250px">问题描述 / Mô tả vấn đề</th>
<th style="min-width:250px">解决方法 / Giải pháp</th>
<th style="min-width:150px">图片 / Hình ảnh</th>
<th class="row-actions">操作</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div style="margin-top:16px;text-align:center">
<button class="btn btn-primary" onclick="addRow()">+ 新增一行 / Thêm dòng mới</button>
</div>
</div>

<div class="image-viewer" id="imageViewer" onclick="closeViewer()">
<button class="close-btn" onclick="closeViewer()">X</button>
<img id="viewerImage" src="">
</div>
<div style="display:none"><input type="file" id="hiddenImageInput" accept="image/*" multiple onchange="handleImageUpload(event)"></div>

<script>
let records=JSON.parse(localStorage.getItem('issueTrackerV2')||'[]');
let currentRow=-1,currentImages=[];

const dict={'记录人':'Người ghi','Người ghi':'记录人','日期':'Ngày','Ngày':'日期','项目号':'Mã dự án','Mã dự án':'项目号','工单号':'Mã công việc','Mã công việc':'工单号','问题':'Vấn đề','Vấn đề':'问题','描述':'Mô tả','Mô tả':'描述','无法':'Không thể','Không thể':'无法','连接':'Kết nối','Kết nối':'连接','服务器':'Máy chủ','Máy chủ':'服务器','错误':'Lỗi','Lỗi':'错误','成功':'Thành công','Thành công':'成功','失败':'Thất bại','Thất bại':'失败','处理':'Xử lý','Xử lý':'处理','完成':'Hoàn thành','Hoàn thành':'完成','已解决':'Đã giải quyết','Đã giải quyết':'已解决','待处理':'Chờ xử lý','Chờ xử lý':'待处理','紧急':'Khẩn cấp','Khẩn cấp':'紧急','重要':'Quan trọng','Quan trọng':'重要','网络':'Mạng','Mạng':'网络','系统':'Hệ thống','Hệ thống':'系统','数据库':'Cơ sở dữ liệu','Cơ sở dữ liệu':'数据库','软件':'Phần mềm','Phần mềm':'软件','硬件':'Phần cứng','Phần cứng':'硬件','用户':'Người dùng','Người dùng':'用户','密码':'Mật khẩu','Mật khẩu':'密码','登录':'Đăng nhập','Đăng nhập':'登录','权限':'Quyền hạn','Quan trận hạn':'权限','更新':'Cập nhật','Cập nhật':'更新','安装':'Cài đặt','Cài đặt':'安装','配置':'Cấu hình','Cấu hình':'配置','测试':'Kiểm tra','Kiểm tra':'测试','生产':'Sản xuất','Sản xuất':'生产','开发':'Phát triển','Phát triển':'开发','部署':'Triển khai','Triển khai':'部署','维护':'Bảo trì','Bảo trì':'维护'};

function translate(text){
let result=text;
for(const[k,v]of Object.entries(dict)){
result=result.split(k).join(v);
}
return result;
}

function autoTranslate(id){
const el=document.getElementById(id);
if(!el)return;
const row=el.closest('tr');
const cnEl=row.querySelector('.cn-cell textarea');
const viEl=row.querySelector('.vi-cell textarea');
if(el.classList.contains('cn-cell')){
if(el.value&&!viEl.value)viEl.value=translate(el.value);
}else{
if(el.value&&!cnEl.value)cnEl.value=translate(el.value);
}
saveData();
}

function renderTable(){
const tbody=document.getElementById('tableBody');
if(records.length===0){
tbody.innerHTML='<tr><td colspan="5" class="empty-row">暂无记录，点击下方按钮新增 / Chưa có bản ghi</td></tr>';
return;
}
tbody.innerHTML=records.map((r,i)=>
'<tr data-index="'+i+'">'+
'<td class="row-num">'+(i+1)+'</td>'+
'<td class="cell-lang">'+
'<span class="lang-label cn">中文</span><textarea class="cn-cell" rows="2" placeholder="问题描述..." oninput="autoTranslate(this.id)" id="issueCn_'+i+'">'+escapeHtml(r.issueCn||'')+'</textarea>'+
'<span class="lang-label vi">Tiếng Việt</span><textarea class="vi-cell" rows="2" placeholder="Mô tả..." oninput="autoTranslate(this.id)" id="issueVi_'+i+'">'+escapeHtml(r.issueVi||'')+'</textarea>'+
'</td>'+
'<td class="cell-lang">'+
'<span class="lang-label cn">中文</span><textarea class="cn-cell" rows="2" placeholder="解决方法..." oninput="autoTranslate(this.id)" id="solCn_'+i+'">'+escapeHtml(r.solCn||'')+'</textarea>'+
'<span class="lang-label vi">Tiếng Việt</span><textarea class="vi-cell" rows="2" placeholder="Giải pháp..." oninput="autoTranslate(this.id)" id="solVi_'+i+'">'+escapeHtml(r.solVi||'')+'</textarea>'+
'</td>'+
'<td class="image-cell">'+
'<div class="image-preview" id="imgPreview_'+i+'">'+
(r.images||[]).map((img,idx)=>'<img src="'+img+'" class="image-thumb" onclick="openViewer(\''+img.replace(/'/g,"\\'")+'\')" title="点击放大">').join('')+
'</div>'+
'<div style="margin-top:8px">'+
'<button class="btn btn-outline btn-sm" onclick="triggerImageUpload('+i+')">+ 图片</button>'+
'</div>'+
'</td>'+
'<td><button class="delete-row" onclick="deleteRow('+i+')">🗑️</button></td>'+
'</tr>').join('');
}

function escapeHtml(str){if(!str)return'';return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function addRow(){
records.unshift({issueCn:'',issueVi:'',solCn:'',solVi:'',images:[]});
saveData();renderTable();
}

function deleteRow(idx){
if(confirm('删除此行？')){records.splice(idx,1);saveData();renderTable();}
}

function saveData(){
records.forEach((r,i)=>{
const cnI=document.getElementById('issueCn_'+i);
const viI=document.getElementById('issueVi_'+i);
const cnS=document.getElementById('solCn_'+i);
const viS=document.getElementById('solVi_'+i);
if(cnI)r.issueCn=cnI.value;
if(viI)r.issueVi=viI.value;
if(cnS)r.solCn=cnS.value;
if(viS)r.solVi=viS.value;
});
localStorage.setItem('issueTrackerV2',JSON.stringify(records));
}

function triggerImageUpload(idx){
currentRow=idx;
document.getElementById('hiddenImageInput').click();
}

function handleImageUpload(e){
if(currentRow<0||!e.target.files.length)return;
const files=Array.from(e.target.files);
const r=records[currentRow];
if(!r.images)r.images=[];
files.slice(0,6-r.images.length).forEach(f=>{
const reader=new FileReader();
reader.onload=t=>{r.images.push(t.target.result);renderTable();};
reader.readAsDataURL(f);
});
saveData();
e.target.value='';
}

function openViewer(src){
document.getElementById('viewerImage').src=src;
document.getElementById('imageViewer').classList.add('active');
}

function closeViewer(){document.getElementById('imageViewer').classList.remove('active');}

document.addEventListener('DOMContentLoaded',()=>{
document.getElementById('headerDate').valueAsDate=new Date();
const saved=JSON.parse(localStorage.getItem('issueTrackerHeader')||'{}');
if(saved.date)document.getElementById('headerDate').value=saved.date;
if(saved.recorder)document.getElementById('headerRecorder').value=saved.recorder;
if(saved.project)document.getElementById('headerProject').value=saved.project;
if(saved.ticket)document.getElementById('headerTicket').value=saved.ticket;
renderTable();
});

window.addEventListener('beforeunload',()=>{
const header={date:document.getElementById('headerDate').value,recorder:document.getElementById('headerRecorder').value,project:document.getElementById('headerProject').value,ticket:document.getElementById('headerTicket').value};
localStorage.setItem('issueTrackerHeader',JSON.stringify(header));
saveData();
});

function exportExcel(){
if(records.length===0){alert('暂无数据！');return;}
let csv='\uFEFF序号,日期,记录人,项目号,工单号,问题(中文),问题(越南文),解决方法(中文),解决方法(越南文),图片数量\n';
records.forEach((r,i)=>{
const h=JSON.parse(localStorage.getItem('issueTrackerHeader')||'{}');
csv+=(i+1)+',"'+(h.date||'')+'","'+(h.recorder||'')+'","'+(h.project||'')+'","'+(h.ticket||'')+'","'+(r.issueCn||'')+'","'+(r.issueVi||'')+'","'+(r.solCn||'')+'","'+(r.solVi||'')+'","'+(r.images?.length||0)+'"\n';
});
const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);
a.download='问题追踪表_'+new Date().toISOString().split('T')[0]+'.csv';a.click();
}

function exportPDF(){
if(records.length===0){alert('暂无数据！');return;}
const h=JSON.parse(localStorage.getItem('issueTrackerHeader')||'{}');
const p=window.open('','');
p.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>问题追踪表</title><style>body{font-family:Arial,sans-serif;padding:20px}h1{text-align:center}h3{margin:16px 0 8px}p{margin:0 0 8px}table{width:100%;border-collapse:collapse;margin-top:16px}th,td{border:1px solid #ddd;padding:8px;text-align:left;font-size:12px}th{background:#f5f5f5}</style></head><body><h1>问题追踪表</h1><p><b>日期:</b> '+h.date+' | <b>记录人:</b> '+h.recorder+' | <b>项目号:</b> '+h.project+' | <b>工单号:</b> '+h.ticket+'</p><table><thead><tr><th>#</th><th>问题描述(中文/越南文)</th><th>解决方法(中文/越南文)</th><th>图片</th></tr></thead><tbody>'+records.map((r,i)=>'<tr><td>'+(i+1)+'</td><td>'+(r.issueCn||'')+'<br><br>'+(r.issueVi||'')+'</td><td>'+(r.solCn||'')+'<br><br>'+(r.solVi||'')+'</td><td>'+(r.images?.length||0)+'张</td></tr>').join('')+'</tbody></table><script>window.print();<\/script></body></html>');
p.document.close();
}
</script>
</body>
</html>
